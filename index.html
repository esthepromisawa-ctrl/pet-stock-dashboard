<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ペットフード在庫ダッシュボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Meiryo", "Hiragino Kaku Gothic Pro", sans-serif;
      background: #f0f4f8;
      color: #2d3748;
      padding: 20px;
    }
    h1 {
      font-size: 20px;
      font-weight: bold;
      color: #2b6cb0;
      margin-bottom: 4px;
    }
    .meta {
      font-size: 12px;
      color: #718096;
      margin-bottom: 20px;
    }
    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .controls input {
      padding: 8px 12px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 14px;
      width: 240px;
    }
    .controls button {
      padding: 8px 16px;
      background: #2b6cb0;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .controls button:hover { background: #2c5282; }
    .controls button.reload {
      background: #38a169;
    }
    .controls button.reload:hover { background: #276749; }
    .summary {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .card {
      background: white;
      border-radius: 10px;
      padding: 16px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      min-width: 140px;
    }
    .card .label { font-size: 12px; color: #718096; }
    .card .value { font-size: 28px; font-weight: bold; color: #2d3748; }
    .card.warn .value { color: #c05621; }
    .table-wrap {
      overflow-x: auto;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    table {
      width: 100%;
      min-width: 820px;
      border-collapse: collapse;
      background: white;
    }
    thead th {
      background: #2b6cb0;
      color: white;
      padding: 8px 10px;
      text-align: left;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { background: #2c5282; }
    thead th.num { text-align: right; }
    tbody tr:nth-child(even) { background: #f7fafc; }
    tbody tr:hover { background: #ebf8ff; }
    tbody td {
      padding: 8px 10px;
      font-size: 13px;
      border-bottom: 1px solid #e2e8f0;
      white-space: nowrap;
    }
    tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: bold;
    }
    .badge.ok { background: #c6f6d5; color: #276749; }
    .badge.low { background: #feebc8; color: #c05621; }
    .badge.zero { background: #fed7d7; color: #9b2c2c; }
    .no-data { text-align: center; padding: 40px; color: #a0aec0; font-size: 15px; }
    .error-msg { background: #fff5f5; border: 1px solid #fc8181; border-radius: 8px; padding: 16px; color: #c53030; margin-bottom: 16px; display: none; }
    .loading { text-align: center; padding: 40px; color: #718096; }
  </style>
</head>
<body>

<h1>🐾 ペットフード在庫ダッシュボード</h1>
<div class="meta" id="metaLine">読み込み中...</div>

<div id="errorMsg" class="error-msg"></div>

<div class="controls">
  <input type="text" id="searchBox" placeholder="商品名で絞り込み..." oninput="filterTable()" />
  <span style="font-size:12px; color:#718096;">平日に自動更新されます</span>
</div>

<div class="summary" id="summaryCards"></div>

<div class="table-wrap"><table id="stockTable">
  <thead>
    <tr>
      <th onclick="sortBy(0)">コード ↕</th>
      <th onclick="sortBy(1)">商品名 ↕</th>
      <th class="num" onclick="sortBy(2)">良品在庫(A) ↕</th>
      <th class="num" onclick="sortBy(3)">指示済(B) ↕</th>
      <th class="num" onclick="sortBy(4)">受注残(C) ↕</th>
      <th class="num" onclick="sortBy(5)">正しい在庫 ↕</th>
      <th>状態</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr><td colspan="7" class="loading">データを読み込んでいます...</td></tr>
  </tbody>
</table></div>

<script>
let allItems = [];
let sortCol = 1;
let sortAsc = true;

async function loadData() {
  const errEl = document.getElementById("errorMsg");
  errEl.style.display = "none";
  document.getElementById("tableBody").innerHTML = '<tr><td colspan="7" class="loading">データを読み込んでいます...</td></tr>';
  document.getElementById("metaLine").textContent = "読み込み中...";

  try {
    const res = await fetch("stock_data.json?t=" + Date.now());
    if (!res.ok) throw new Error("stock_data.json が見つかりません。先に pet_stock_fetcher.py を実行してください。");
    const data = await res.json();
    allItems = data.items || [];
    document.getElementById("metaLine").textContent = `最終更新: ${data.updated_at}　/ 全 ${allItems.length} 商品`;
    renderTable();
  } catch (e) {
    errEl.style.display = "block";
    errEl.textContent = "⚠ " + e.message;
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="7" class="no-data">データを取得できませんでした</td></tr>';
    document.getElementById("metaLine").textContent = "";
  }
}

function renderTable() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  let items = allItems.filter(item =>
    item.name.toLowerCase().includes(q) || item.code.toLowerCase().includes(q)
  );

  // ソート
  items.sort((a, b) => {
    const vals = [
      [a.code, b.code],
      [a.name, b.name],
      [a.good_stock, b.good_stock],
      [a.reserved, b.reserved],
      [a.ordered, b.ordered],
      [a.real_stock, b.real_stock],
    ];
    const [av, bv] = vals[sortCol] || [a.name, b.name];
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  // サマリー計算
  const total = items.length;
  const zeroItems = items.filter(x => x.real_stock <= 0).length;
  const lowItems  = items.filter(x => x.real_stock > 0 && x.real_stock <= 30).length;
  document.getElementById("summaryCards").innerHTML = `
    <div class="card"><div class="label">対象商品数</div><div class="value">${total}</div></div>
    <div class="card ${zeroItems > 0 ? 'warn' : ''}"><div class="label">在庫切れ</div><div class="value">${zeroItems}</div></div>
    <div class="card ${lowItems > 0 ? 'warn' : ''}"><div class="label">残り30以下</div><div class="value">${lowItems}</div></div>
  `;

  const fmt = n => n.toLocaleString();

  if (items.length === 0) {
    document.getElementById("tableBody").innerHTML = '<tr><td colspan="7" class="no-data">該当する商品がありません</td></tr>';
    return;
  }

  document.getElementById("tableBody").innerHTML = items.map(item => {
    const rs = item.real_stock;
    const badge = rs <= 0
      ? '<span class="badge zero">在庫切れ</span>'
      : rs <= 30
      ? '<span class="badge low">残りわずか</span>'
      : '<span class="badge ok">在庫あり</span>';
    return `<tr>
      <td>${item.code}</td>
      <td>${item.name}</td>
      <td class="num">${fmt(item.good_stock)}</td>
      <td class="num">${fmt(item.reserved)}</td>
      <td class="num">${fmt(item.ordered)}</td>
      <td class="num" style="font-weight:bold">${fmt(rs)}</td>
      <td>${badge}</td>
    </tr>`;
  }).join("");
}

function filterTable() { renderTable(); }

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  renderTable();
}

loadData();
</script>

<div style="margin-top:24px; font-size:12px; color:#718096; border-top:1px solid #e2e8f0; padding-top:12px;">
  <strong>【項目の定義】</strong><br>
  A（良品在庫）：倉庫に実際にある正常品の在庫数<br>
  B（指示済数）：出荷指示済みだがまだ出荷されていない数（引当済み）<br>
  C（受注残数）：注文は入っているがまだ出荷指示を出していない数<br>
  <strong>正しい在庫 = A − B − C</strong>（今すぐ新しい注文に使える実質在庫）
</div>

</body>
</html>
